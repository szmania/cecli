<svg viewBox="0 0 48 48" width="48" height="48" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#00EE76" />
            <stop offset="20%"  stop-color="#00FF7F" />
            <stop offset="40%"  stop-color="#00FA9A" />
            <stop offset="60%"  stop-color="#00EEEE" />
            <stop offset="80%"  stop-color="#00FFFF" />
            <stop offset="100%" stop-color="#FFFFFF" />
        </linearGradient>
    </defs>
  
    <style>
        .icon-text {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 20px; /* Adjusted for square fit */
            font-weight: bold;
            fill: url(#textGradient);
        }
        .icon-bg {
            fill: #222; /* Dark background to make neon colors pop */
            rx: 8;      /* Rounded corners */
        }
    </style>

    <!-- 1. The Square Background -->
    <rect width="48" height="48" class="icon-bg" />

    <!-- 2. The Centered Text -->
    <text x="24" y="24" 
        class="icon-text" 
        text-anchor="middle" 
        dominant-baseline="central"
    >
        CE_
    </text>
</svg>
